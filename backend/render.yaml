services:
  - type: web
    name: supply-chain-backend
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false          # set this manually in Render dashboard → Environment
      - key: FRONTEND_ORIGIN
        sync: false          # e.g. https://your-app.vercel.app — set in Render dashboard
    healthCheckPath: /api/health
